<!doctype html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#050511"><meta name="description" content="Jelajahi seluruh petisi dan mandat publik MANDAT ZERO."><title>Direktori Mandat — MANDAT//ZERO</title></head><body>
