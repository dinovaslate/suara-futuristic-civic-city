<!doctype html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#050511"><meta name="description" content="Dashboard pengelolaan mandat publik."><title>Dashboard — MANDAT//ZERO</title></head><body>
  <main class="portal-main">
    <header class="dashboard-head reveal"><div class="dashboard-head__copy"><div class="eyebrow"><i></i> Civic operations center</div><h1><span>Kelola <em>tekanan</em></span><span class="dashboard-head__outline">publikmu.</span></h1><p>Pantau mandat, momentum dukungan, dan respons resmi dalam satu jaringan tekanan publik yang hidup.</p></div><button class="button button--primary dashboard-head__cta" id="newPolicyButton"><span>Buat mandat</span><b>＋</b></button></header>
    <section class="dashboard-stats" id="dashboardStats"></section>
    <section class="dashboard-layout"><div class="dashboard-panel reveal"><div class="dashboard-panel__head"><h2>Mandat dalam jaringan</h2><span class="live-pill"><i></i> LIVE DATA</span></div><div class="dashboard-table" id="dashboardTable"></div></div><aside class="dashboard-panel reveal"><div class="dashboard-panel__head"><h2>Aktivitas</h2></div><div class="activity-feed" id="activityFeed"></div></aside></section>
  </main>
  <dialog class="dialog" id="dashboardEditor"><div class="dialog__scrim" data-dashboard-close></div><article class="dialog__panel dialog__panel--editor"><button class="dialog__close" data-dashboard-close aria-label="Tutup">×</button><div class="eyebrow"><i></i> Mandat editor</div><h2 id="dashboardEditorTitle">Buat mandat.</h2><form class="dashboard-form" id="dashboardForm"><input type="hidden" name="id"><label><span>Judul</span><input name="title" required maxlength="110"></label><div class="dashboard-form__row"><label><span>Kategori</span><select name="category"><option>Kota</option><option>Iklim</option><option>Digital</option><option>Kesehatan</option></select></label><label><span>Target dukungan</span><input name="target" type="number" min="100" value="10000" required></label></div><div class="dashboard-form__row"><label><span>Lembaga tujuan</span><input name="owner" required></label><label><span>Wilayah</span><input name="region" required></label></div><label><span>Ringkasan</span><textarea name="summary" rows="6" required></textarea></label><button class="button button--primary" type="submit"><span>Simpan mandat</span><b>↗</b></button></form></article></dialog>
  <script type="module" src="/src/pages/dashboard.js"></script>
</body></html>
